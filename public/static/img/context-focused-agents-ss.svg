<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 120" width="200" height="120" role="img" aria-label="Two overlapping circles meeting at a single focal point">
  <defs>
    <radialGradient id="tile-bg" cx="50%" cy="50%" r="65%">
      <stop offset="0%" stop-color="#fbf5ee"/>
      <stop offset="100%" stop-color="#f0dcc6"/>
    </radialGradient>
  </defs>
  <style>
    svg { color: #655649; }
    @media (prefers-color-scheme: dark) { svg { color: #A39080; } }
  </style>
  <rect width="200" height="120" fill="url(#tile-bg)"/>
  <circle cx="85" cy="60" r="40" stroke="currentColor" stroke-width="3" fill="none"/>
  <circle cx="115" cy="60" r="40" stroke="currentColor" stroke-width="3" fill="none"/>
  <circle cx="100" cy="60" r="6" fill="#b4a461"/>
  <circle cx="100" cy="60" r="6" fill="none" stroke="currentColor" stroke-width="1.5"/>
</svg>
