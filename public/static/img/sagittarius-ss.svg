<svg version="1.1" viewBox="0 0 200 120" width="200" height="120" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="An arrow drawn along a dashed orbital arc toward a target">
  <defs>
    <radialGradient id="tile-bg" cx="50%" cy="50%" r="65%">
      <stop offset="0%" stop-color="#fbf5ee"/>
      <stop offset="100%" stop-color="#f0dcc6"/>
    </radialGradient>
  </defs>
  <style>svg { color: #655649; }
    @media (prefers-color-scheme: dark) { svg { color: #A39080; } }</style>
  <rect width="200" height="120" fill="url(#tile-bg)"/>
  <g transform="translate(100 60)">
    <!-- target the arrow converges on -->
    <circle cx="52" cy="-14" r="16" fill="#b4a461"/>
    <circle cx="52" cy="-14" r="8" fill="none" stroke="#767676" stroke-width="2.5"/>
    <!-- dashed orbital trajectory the arrow travels -->
    <path d="M -66 26 A 92 92 0 0 1 52 -14" fill="none" stroke="#767676" stroke-dasharray="3, 5" stroke-width="2.5"/>
    <!-- Sagittarius arrow, nocked and drawn along the arc -->
    <g transform="rotate(-35)" fill="currentColor">
      <rect x="-40" y="-1.6" width="66" height="3.2"/>
      <polygon points="26 0 14 -8 14 8"/>
      <polygon points="-40 0 -33 -6 -33 6"/>
      <rect transform="rotate(38 -40 0)" x="-42" y="-9" width="3" height="18"/>
    </g>
  </g>
</svg>
